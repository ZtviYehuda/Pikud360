version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: pikud360-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_secure_pass_123}
      POSTGRES_DB: ${POSTGRES_DB:-pikud360_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres.init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pikud360-network

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: pikud360-backend
    environment:
      - FLASK_APP=run.py
      - FLASK_ENV=${FLASK_ENV:-development}
      - SECRET_KEY=${SECRET_KEY:-change_this_to_a_secure_random_hex_key_in_production}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change_this_to_another_secure_random_hex_key_in_production}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres_secure_pass_123}
      - POSTGRES_DB=${POSTGRES_DB:-pikud360_db}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - DB_MIN_CONNECTIONS=${DB_MIN_CONNECTIONS:-1}
      - DB_MAX_CONNECTIONS=${DB_MAX_CONNECTIONS:-10}
      - PORT=5000
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pikud360-network

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: pikud360-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:5000}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - pikud360-network

volumes:
  postgres_data:

networks:
  pikud360-network:
    driver: bridge
